<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>落地页 - Taste Skill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
  </style>
</head>
<body class="bg-stone-50">
  <!-- Minimalist Hero -->
  <div class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-4xl mx-auto text-center">
      <p class="text-sm tracking-widest text-gray-400 uppercase mb-6">Taste Skill 出品</p>
      <h1 class="text-7xl font-light text-gray-800 mb-8 leading-tight">
        少即是多
      </h1>
      <p class="text-xl text-gray-500 mb-12 max-w-lg mx-auto">
        极致简约，回归本质
      </p>
      <button class="px-10 py-4 bg-gray-900 text-white text-sm tracking-wide hover:bg-gray-800 transition">
        探索更多
      </button>
    </div>
  </div>

  <!-- Subtle Features -->
  <div class="bg-white py-32">
    <div class="container mx-auto px-6">
      <div class="grid grid-cols-3 gap-20 max-w-5xl mx-auto">
        <div class="text-center">
          <div class="text-6xl font-light text-gray-300 mb-4">01</div>
          <h3 class="text-lg font-normal mb-2">克制</h3>
          <p class="text-gray-400 text-sm">去掉多余，留下精华</p>
        </div>
        <div class="text-center">
          <div class="text-6xl font-light text-gray-300 mb-4">02</div>
          <h3 class="text-lg font-normal mb-2">平衡</h3>
          <p class="text-gray-400 text-sm">视觉与功能的完美平衡</p>
        </div>
        <div class="text-center">
          <div class="text-6xl font-light text-gray-300 mb-4">03</div>
          <h3 class="text-lg font-normal mb-2">细节</h3>
          <p class="text-gray-400 text-sm">每个细节都经过深思熟虑</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
