<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>仪表盘 - Taste Skill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400&display=swap');
    body { font-family: 'Noto Sans SC', sans-serif; }
  </style>
</head>
<body class="bg-stone-50">
  <div class="min-h-screen p-16">
    <div class="max-w-5xl mx-auto">
      <p class="text-gray-400 text-xs uppercase tracking-widest mb-8">Taste Skill</p>
      <h1 class="text-5xl font-thin text-gray-800 mb-20">Data</h1>
      
      <div class="space-y-16">
        <div class="flex items-end justify-between border-b border-gray-200 pb-8">
          <div>
            <p class="text-gray-400 text-sm mb-2">Users</p>
            <p class="text-7xl font-thin text-gray-900">12.4k</p>
          </div>
          <div class="text-right">
            <span class="text-gray-400 text-sm">+12.5%</span>
          </div>
        </div>

        <div class="flex items-end justify-between border-b border-gray-200 pb-8">
          <div>
            <p class="text-gray-400 text-sm mb-2">Revenue</p>
            <p class="text-7xl font-thin text-gray-900">¥892k</p>
          </div>
          <div class="text-right">
            <span class="text-gray-400 text-sm">-3.1%</span>
          </div>
        </div>

        <div class="flex items-end justify-between border-b border-gray-200 pb-8">
          <div>
            <p class="text-gray-400 text-sm mb-2">Conversion</p>
            <p class="text-7xl font-thin text-gray-900">23.5%</p>
          </div>
          <div class="text-right">
            <span class="text-gray-600 text-sm">+5.4%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
