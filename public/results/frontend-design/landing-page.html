<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品落地页 - Frontend Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Hero Section -->
  <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white">
    <div class="container mx-auto px-6 py-20 text-center">
      <h1 class="text-5xl font-bold mb-4">打造卓越产品</h1>
      <p class="text-xl mb-8">Frontend Design 技能生成的现代化落地页</p>
      <button class="bg-white text-blue-600 px-8 py-3 rounded-lg font-semibold hover:shadow-lg transition">
        开始使用
      </button>
    </div>
  </div>

  <!-- Features -->
  <div class="container mx-auto px-6 py-16">
    <div class="grid grid-cols-3 gap-8">
      <div class="text-center p-6">
        <div class="text-4xl mb-4">🚀</div>
        <h3 class="text-xl font-semibold mb-2">快速部署</h3>
        <p class="text-gray-600">一键部署，秒级上线</p>
      </div>
      <div class="text-center p-6">
        <div class="text-4xl mb-4">🎨</div>
        <h3 class="text-xl font-semibold mb-2">精美设计</h3>
        <p class="text-gray-600">专业UI/UX设计支持</p>
      </div>
      <div class="text-center p-6">
        <div class="text-4xl mb-4">📊</div>
        <h3 class="text-xl font-semibold mb-2">数据分析</h3>
        <p class="text-gray-600">实时数据监控分析</p>
      </div>
    </div>
  </div>

  <!-- Pricing -->
  <div class="bg-gray-50 py-16">
    <div class="container mx-auto px-6">
      <h2 class="text-3xl font-bold text-center mb-12">定价方案</h2>
      <div class="grid grid-cols-3 gap-8 max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-xl font-semibold mb-4">基础版</h3>
          <div class="text-3xl font-bold mb-4">¥99<span class="text-base text-gray-500">/月</span></div>
          <button class="w-full bg-blue-600 text-white py-2 rounded">选择方案</button>
        </div>
        <div class="bg-white p-6 rounded-lg shadow border-2 border-blue-600">
          <div class="bg-blue-600 text-white text-xs font-semibold px-3 py-1 rounded-full inline-block mb-4">推荐</div>
          <h3 class="text-xl font-semibold mb-4">专业版</h3>
          <div class="text-3xl font-bold mb-4">¥299<span class="text-base text-gray-500">/月</span></div>
          <button class="w-full bg-blue-600 text-white py-2 rounded">选择方案</button>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
          <h3 class="text-xl font-semibold mb-4">企业版</h3>
          <div class="text-3xl font-bold mb-4">¥999<span class="text-base text-gray-500">/月</span></div>
          <button class="w-full bg-blue-600 text-white py-2 rounded">选择方案</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
