<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品落地页 - UI/UX Pro Max</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Hero Section -->
  <div class="relative bg-gray-900 text-white overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-r from-purple-900 to-blue-900 opacity-90"></div>
    <div class="relative container mx-auto px-6 py-32 text-center">
      <div class="inline-block px-4 py-1 bg-white bg-opacity-20 rounded-full text-sm mb-6">
        ✨ UI/UX Pro Max 生成
      </div>
      <h1 class="text-6xl font-bold mb-6">用户体验至上</h1>
      <p class="text-xl mb-10 max-w-2xl mx-auto opacity-90">
        专业UI/UX设计，每一个像素都经过精心打磨
      </p>
      <div class="space-x-4">
        <button class="bg-white text-gray-900 px-8 py-3 rounded-lg font-semibold hover:shadow-xl transition">
          免费试用
        </button>
        <button class="border-2 border-white px-8 py-3 rounded-lg font-semibold hover:bg-white hover:text-gray-900 transition">
          观看演示
        </button>
      </div>
    </div>
  </div>

  <!-- Features with animations -->
  <div class="container mx-auto px-6 py-20">
    <h2 class="text-4xl font-bold text-center mb-16">核心特性</h2>
    <div class="grid grid-cols-3 gap-10">
      <div class="group p-8 bg-white rounded-2xl shadow hover:shadow-2xl transition duration-300">
        <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-red-500 rounded-xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition">
          ⚡
        </div>
        <h3 class="text-2xl font-semibold mb-3">极致性能</h3>
        <p class="text-gray-600">毫秒级响应，流畅体验</p>
      </div>
      <div class="group p-8 bg-white rounded-2xl shadow hover:shadow-2xl transition duration-300">
        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition">
          🎯
        </div>
        <h3 class="text-2xl font-semibold mb-3">精准设计</h3>
        <p class="text-gray-600">像素级完美还原设计稿</p>
      </div>
      <div class="group p-8 bg-white rounded-2xl shadow hover:shadow-2xl transition duration-300">
        <div class="w-16 h-16 bg-gradient-to-br from-green-500 to-emerald-500 rounded-xl flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition">
          🌟
        </div>
        <h3 class="text-2xl font-semibold mb-3">优雅交互</h3>
        <p class="text-gray-600">微交互让产品更有温度</p>
      </div>
    </div>
  </div>
</body>
</html>
