<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数据仪表盘 - UI/UX Pro Max</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 text-white p-6">
      <h2 class="text-xl font-bold mb-8">Analytics Pro</h2>
      <nav class="space-y-3">
        <div class="text-white bg-gray-800 p-3 rounded-lg cursor-pointer">📊 仪表盘</div>
        <div class="text-gray-400 hover:text-white cursor-pointer p-3 rounded">👥 用户</div>
        <div class="text-gray-400 hover:text-white cursor-pointer p-3 rounded">💰 收入</div>
        <div class="text-gray-400 hover:text-white cursor-pointer p-3 rounded">⚙️ 设置</div>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto">
      <div class="p-8">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-3xl font-bold">数据概览</h1>
          <button class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:shadow-lg transition">
            导出报告
          </button>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-4 gap-6 mb-8">
          <div class="bg-white p-6 rounded-xl shadow hover:shadow-xl transition cursor-pointer">
            <div class="flex items-center justify-between mb-4">
              <span class="text-gray-500 text-sm">总用户</span>
              <span class="text-2xl">👥</span>
            </div>
            <p class="text-3xl font-bold mb-2">12,458</p>
            <div class="flex items-center text-green-500 text-sm">
              <span>↑ 12.5%</span>
              <span class="text-gray-400 ml-2">vs 上月</span>
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <div class="flex items-center justify-between mb-4">
              <span class="text-gray-500 text-sm">订单</span>
              <span class="text-2xl">📦</span>
            </div>
            <p class="text-3xl font-bold mb-2">3,287</p>
            <div class="flex items-center text-green-500 text-sm">
              <span>↑ 8.2%</span>
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <div class="flex items-center justify-between mb-4">
              <span class="text-gray-500 text-sm">收入</span>
              <span class="text-2xl">💰</span>
            </div>
            <p class="text-3xl font-bold mb-2">¥89.2万</p>
            <div class="flex items-center text-red-500 text-sm">
              <span>↓ 3.1%</span>
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <div class="flex items-center justify-between mb-4">
              <span class="text-gray-500 text-sm">转化率</span>
              <span class="text-2xl">📈</span>
            </div>
            <p class="text-3xl font-bold mb-2">23.5%</p>
            <div class="flex items-center text-green-500 text-sm">
              <span>↑ 5.4%</span>
            </div>
          </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-2 gap-6">
          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-lg font-semibold mb-4">访问趋势</h3>
            <div class="h-64 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg flex items-center justify-center text-gray-400">
              交互式折线图
            </div>
          </div>
          <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-lg font-semibold mb-4">用户分布</h3>
            <div class="h-64 bg-gradient-to-r from-purple-50 to-pink-50 rounded-lg flex items-center justify-center text-gray-400">
              饼图 / 环形图
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
